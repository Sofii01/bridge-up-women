<section class="faqs">
  <div class="faqs__header fade-in-up">
    <span class="label">PREGUNTAS FRECUENTES</span>
    <h2>Todo lo que necesitas saber</h2>
  </div>

  <div class="faqs__list">
    @for (faq of faqs; track faq.question; let i = $index) {
      <div class="faq-item" [class.faq-item--open]="faq.open" (click)="toggle(i)">
        <div class="faq-item__header">
          <p class="faq-item__question">{{ faq.question }}</p>
          <svg
            class="faq-item__chevron"
            [class.rotated]="faq.open"
            width="20" height="20" viewBox="0 0 20 20" fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M5 7.5L10 12.5L15 7.5" stroke="#2B1E22" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        @if (faq.open) {
          <div class="faq-item__body">
            <p>{{ faq.answer }}</p>
          </div>
        }
      </div>
    }
  </div>
</section>
